kind = "web"
previewPath = "/"
title = "NutritionGhar"
version = "1.0.0"
id = "artifacts/nutritionghar"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19668

[services.development]
run = "pnpm --filter @workspace/nutritionghar run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nutritionghar", "run", "build" ]
publicDir = "artifacts/nutritionghar/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19668"
BASE_PATH = "/"
